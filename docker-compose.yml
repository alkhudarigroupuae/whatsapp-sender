services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=whatsapp_sender
      - POSTGRES_USER=whatsapp_sender
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=4000
    volumes:
      - app_uploads:/app/backend/uploads
      - app_sessions:/app/backend/whatsapp/.session
    depends_on:
      - postgres

volumes:
  pg_data:
  app_uploads:
  app_sessions:
